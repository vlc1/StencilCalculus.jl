name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'
          - 'pre'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
        with:
          path: StencilCalculus
      # StencilCore (runtime) and StencilAssembly (test-only) are unregistered;
      # check them out as siblings so the `[sources]` paths (../StencilCore,
      # ../StencilAssembly) resolve. Drop these once the packages are registered.
      - uses: actions/checkout@v6
        with:
          repository: vlc1/StencilCore.jl
          path: StencilCore
      - uses: actions/checkout@v6
        with:
          repository: vlc1/StencilAssembly.jl
          path: StencilAssembly
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Test
        working-directory: StencilCalculus
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test()'
